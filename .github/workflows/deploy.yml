name: 🤖 CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── CONTINUOUS INTEGRATION (CI) ───────────────────────────────────────────
  ci-backend:
    name: 🧪 CI Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Run Unit Tests
        run: npm run test
        working-directory: backend

      - name: Build Backend
        run: npm run build
        working-directory: backend

  ci-frontend:
    name: 🧪 CI Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Linter
        run: npm run lint
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api

  # ─── CONTINUOUS DEPLOYMENT (CD) ────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            APP_DIR="/var/www/nexusai"

            echo "═══════════════════════════════════════════"
            echo "🤖 Deploying NexusAI..."
            echo "═══════════════════════════════════════════"

            cd $APP_DIR

            # Pull latest code
            echo "📥 Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            # ─── BACKEND ───────────────────────────────
            echo ""
            echo "── Backend ──"
            cd $APP_DIR/backend

            echo "📦 Installing backend dependencies..."
            npm ci

            echo "🗃️ Running Prisma migrations..."
            npx prisma generate
            npx prisma migrate deploy

            echo "🔨 Building NestJS..."
            npm run build

            echo "🔄 Restarting backend..."
            if pm2 describe nexusai-backend > /dev/null 2>&1; then
                pm2 restart nexusai-backend
            else
                pm2 start dist/src/main.js \
                    --name nexusai-backend \
                    --cwd $APP_DIR/backend
            fi

            # ─── FRONTEND ──────────────────────────────
            echo ""
            echo "── Frontend ──"
            cd $APP_DIR/frontend

            echo "📦 Installing frontend dependencies..."
            npm ci

            echo "🔨 Building Next.js..."
            npm run build

            echo "🔄 Restarting frontend..."
            if pm2 describe nexusai-frontend > /dev/null 2>&1; then
                pm2 restart nexusai-frontend
            else
                pm2 start npm \
                    --name nexusai-frontend \
                    -- start
            fi

            pm2 save

            echo ""
            echo "✅ NexusAI deployed successfully!"
            echo "🌐 https://nexusai.baoduong.dev"

