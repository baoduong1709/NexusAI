name: 🤖 CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── DETECT CHANGES ────────────────────────────────────────────────────────
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'

  # ─── CONTINUOUS INTEGRATION (CI) ───────────────────────────────────────────
  ci-backend:
    name: 🧪 CI Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Run Unit Tests
        run: npm run test
        working-directory: backend

      - name: Build Backend
        run: npm run build
        working-directory: backend

  ci-frontend:
    name: 🧪 CI Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Linter
        run: npm run lint
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api

  # ─── CONTINUOUS DEPLOYMENT (CD) ────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    needs: [detect-changes, ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect-changes.result == 'success' &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true') &&
      (needs.ci-backend.result == 'success' || needs.ci-backend.result == 'skipped') &&
      (needs.ci-frontend.result == 'success' || needs.ci-frontend.result == 'skipped')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            APP_DIR="/var/www/nexusai"

            echo "═══════════════════════════════════════════"
            echo "🤖 Deploying NexusAI..."
            echo "═══════════════════════════════════════════"

            cd $APP_DIR

            # Fetch mới nhất để so sánh Git diff
            echo "🔍 Fetching remote repository..."
            git fetch origin main

            # Kiểm tra thay đổi bằng git diff trước khi pull
            # So sánh HEAD hiện tại của VPS với commit mới nhất trên origin/main
            CHANGES_BACKEND=$(git diff --name-only HEAD origin/main | grep '^backend/' || true)
            CHANGES_FRONTEND=$(git diff --name-only HEAD origin/main | grep '^frontend/' || true)

            # Kéo code mới
            echo "📥 Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            # ─── DEPLOY BACKEND ────────────────────────
            if [ ! -z "$CHANGES_BACKEND" ]; then
                echo ""
                echo "⚡ [Backend] Changes detected. Updating..."
                cd $APP_DIR/backend

                echo "📦 Installing backend dependencies..."
                npm ci

                echo "🗃️ Running Prisma migrations..."
                npx prisma generate
                npx prisma migrate deploy

                echo "🔨 Building NestJS..."
                npm run build

                echo "🔄 Restarting backend..."
                if pm2 describe nexusai-backend > /dev/null 2>&1; then
                    pm2 restart nexusai-backend
                else
                    pm2 start dist/src/main.js \
                        --name nexusai-backend \
                        --cwd $APP_DIR/backend
                fi
            else
                echo ""
                echo "⏭️ [Backend] No changes. Skipping build & restart."
            fi

            # ─── DEPLOY FRONTEND ───────────────────────
            if [ ! -z "$CHANGES_FRONTEND" ]; then
                echo ""
                echo "⚡ [Frontend] Changes detected. Updating..."
                cd $APP_DIR/frontend

                echo "📦 Installing frontend dependencies..."
                npm ci

                echo "🔨 Building Next.js..."
                npm run build

                echo "🔄 Restarting frontend..."
                if pm2 describe nexusai-frontend > /dev/null 2>&1; then
                    pm2 restart nexusai-frontend
                else
                    pm2 start npm \
                        --name nexusai-frontend \
                        -- start
                fi
            else
                echo ""
                echo "⏭️ [Frontend] No changes. Skipping build & restart."
            fi

            # Lưu cấu hình PM2
            pm2 save

            echo ""
            echo "✅ NexusAI deployed successfully!"
            echo "🌐 https://nexusai.baoduong.dev"

